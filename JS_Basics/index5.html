<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Event Bubbling Demo</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    background: #ddd;
  }

  .top-btn {
    margin: 20px;
    padding: 10px 20px;
    background: black;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }

  .card {
    background: yellow;
    width: 320px;
    margin: 40px auto;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 5px 10px rgba(0,0,0,0.2);
  }

  #head {
    color: red;
    font-size: 26px;
  }

  .highlight {
    background: purple;
    color: white;
    padding: 3px 10px;
    border: 2px solid red;
    display: inline-block;
    transform: skew(-10deg);
  }

  .btn {
    display: block;
    margin: 10px auto;
    padding: 8px 15px;
    border-radius: 8px;
    border: none;
    background: #ccc;
    cursor: pointer;
    font-weight: bold;
  }

  .btn span {
    background: purple;
    color: white;
    padding: 3px 6px;
    border: 2px solid red;
    margin-left: 5px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    margin: 50px 20px;
    gap: 20px;
  }

  .grid h2 {
    font-weight: bold;
  }

  .bottom {
    font-size: 32px;
    font-weight: bold;
    margin-bottom: 50px;
  }
</style>
</head>

<body>

<button class="top-btn" onclick="changeColor()">Change Body Color</button>

<!-- Parent structure for bubbling -->
<div class="wrapper">  <!-- parentNode.parentNode -->
  <div class="card">   <!-- parentNode -->

    <h1 id="head">
      This is <span class="highlight">Heading</span>
    </h1>

    <button class="btn">Clink on Me</button>
    <button class="btn">Clink on Me</button>
    <button class="btn">
      Clink on Me <span>Not Work</span>
    </button>

  </div>
</div>

<div class="grid">
  <h2>we are h2</h2>
  <h2>we are h2</h2>
  <h2>we are h2</h2>
  <h2>we are h2</h2>
  <h2>we are h2</h2>
  <h2>we are h2</h2>

  <h2>we are h2</h2>
  <h2>we are h2</h2>
  <h2>we are h2</h2>
  <h2>we are h2</h2>
</div>

<div class="bottom">Click Me</div>

<script>
function changeColor() {
  document.body.style.background =
    '#' + Math.floor(Math.random()*16777215).toString(16);
}
</script>

</body>
</html>
